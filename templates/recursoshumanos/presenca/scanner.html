{% extends 'recursoshumanos/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header text-center">
                <h4 class="mb-0">Scanner de Presença</h4>
            </div>
            <div class="card-body text-center">
                <div id="scanner-container" style="width: 100%; height: 400px; border: 2px dashed #ccc; margin-bottom: 20px;">
                    <p class="text-muted mt-5">Posicione o QR code do funcionário na câmera</p>
                </div>
                
                <div class="btn-group" role="group">
                    <button type="button" class="btn btn-primary" onclick="iniciarScanner('entrada')">
                        <i class="fas fa-sign-in-alt"></i> Registrar Entrada
                    </button>
                    <button type="button" class="btn btn-warning" onclick="iniciarScanner('saida')">
                        <i class="fas fa-sign-out-alt"></i> Registrar Saída
                    </button>
                </div>
                
                <div id="resultado" class="mt-3" style="display: none;">
                    <div class="alert alert-success">
                        <h5>Registro Efetuado!</h5>
                        <p id="mensagem-resultado"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script>
let html5QrCode;
let scannerAtivo = false;

function iniciarScanner(tipo) {
    if (!scannerAtivo) {
        html5QrCode = new Html5Qrcode("scanner-container");
        
        const config = { fps: 10, qrbox: 250 };
        
        html5QrCode.start(
            { facingMode: "environment" },
            config,
            qrCodeMessage => {
                registrarPresenca(qrCodeMessage, tipo);
                html5QrCode.stop();
                scannerAtivo = false;
            }
        ).catch(err => {
            console.error(err);
            alert("Erro ao iniciar scanner: " + err);
        });
        
        scannerAtivo = true;
    }
}

function registrarPresenca(qrData, tipo) {
    fetch("{% url 'recursoshumanos:scanner_presenca' %}", {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'X-CSRFToken': '{{ csrf_token }}'
        },
        body: `qr_data=${encodeURIComponent(qrData)}&tipo=${tipo}`
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            document.getElementById('mensagem-resultado').textContent = 
                `Presença registrada para: ${data.funcionario}`;
            document.getElementById('resultado').style.display = 'block';
            
            setTimeout(() => {
                document.getElementById('resultado').style.display = 'none';
            }, 3000);
        } else {
            alert('Erro ao registrar presença');
        }
    });
}
</script>
{% endblock %}
