<!-- templates/dfec/partials/header.html -->
<header class="navbar navbar-dark sticky-top bg-primary flex-md-nowrap p-0 shadow">
    <a class="navbar-brand col-md-3 col-lg-2 me-0 px-3" href="{% url 'dfec:dashboard' %}">
        <i class="fas fa-graduation-cap me-2"></i>
        <strong>DFEC</strong>
        <small class="d-none d-md-inline"> - Direção de Formação e Educação Cívica</small>
    </a>

    <button class="navbar-toggler position-absolute d-md-none collapsed" type="button"
            data-bs-toggle="collapse" data-bs-target="#sidebarMenu">
        <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Search -->
    <div class="w-100 d-none d-md-block">
        <form class="d-flex mx-3" method="GET" action="#">
            <input class="form-control form-control-dark" type="search"
                   placeholder="Pesquisar atividades, formações, participantes..."
                   aria-label="Search" name="q">
        </form>
    </div>

    <!-- User Menu -->
    <div class="dropdown">
        <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle"
           id="dropdownUser" data-bs-toggle="dropdown">
            <img src="https://ui-avatars.com/api/?name={{ user.username|urlencode }}&background=0D8ABC&color=fff"
                 alt="Avatar" class="rounded-circle me-2" width="32" height="32">
            <strong>{{ user.get_full_name|default:user.username }}</strong>
        </a>
        <ul class="dropdown-menu dropdown-menu-dark text-small shadow" aria-labelledby="dropdownUser">
            <li><a class="dropdown-item" href="#">
                <i class="fas fa-user me-2"></i>Perfil
            </a></li>
            <li><a class="dropdown-item" href="{% url 'dfec:configuracoes' %}">
                <i class="fas fa-cog me-2"></i>Configurações
            </a></li>
            <li><hr class="dropdown-divider"></li>
            {% if user.is_superuser %}
            <li><a class="dropdown-item" href="{% url 'admin:index' %}">
                <i class="fas fa-shield-alt me-2"></i>Administração
            </a></li>
            <li><hr class="dropdown-divider"></li>
            {% endif %}
            <li><a class="dropdown-item" href="{% url 'dfec:logout' %}">
                <i class="fas fa-sign-out-alt me-2"></i>Terminar Sessão
            </a></li>
        </ul>
    </div>
</header>
