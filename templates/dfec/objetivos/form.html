{% extends 'dfec/base.html' %}

{% block title %}{{ titulo }} - DFEC{% endblock %}
{% block page_title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-6">
        <div class="card shadow mb-4">
            <div class="card-header py-3">
                <h6 class="m-0 fw-bold text-primary">Dados do Objetivo Estratégico</h6>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Ano *</label>
                            {{ form.ano }}
                        </div>
                        <div class="col-md-8">
                            <label class="form-label">Título do Objetivo *</label>
                            {{ form.titulo }}
                        </div>
                        <div class="col-12">
                            <label class="form-label">Descrição Detalhada</label>
                            {{ form.descricao }}
                        </div>
                        <div class="col-12">
                            <div class="form-check">
                                {{ form.ativo }}
                                <label class="form-check-label" for="{{ form.ativo.id_for_label }}">Objetivo
                                    Ativo</label>
                            </div>
                        </div>
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">Salvar</button>
                        <a href="{% url 'dfec:objetivos_lista' %}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
