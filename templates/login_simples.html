<!-- templates/login_simples.html - VERSÃO CORRIGIDA -->
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Portal STAE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .login-card { max-width: 400px; margin: 100px auto; }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0">Portal STAE</h4>
                <small>Área de Login</small>
            </div>
            <div class="card-body">
                {% if error %}
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    {{ error }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endif %}

                <form method="post">
                    <!-- NÃO PRECISA DE CSRF_TOKEN - CSRF ESTÁ DESATIVADO -->

                    <div class="mb-3">
                        <label for="username" class="form-label">Usuário:</label>
                        <input type="text"
                               id="username"
                               name="username"
                               class="form-control"
                               required
                               autofocus>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Senha:</label>
                        <input type="password"
                               id="password"
                               name="password"
                               class="form-control"
                               required>
                    </div>

                    {% if request.GET.next %}
                    <input type="hidden" name="next" value="{{ request.GET.next }}">
                    {% endif %}

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            Entrar no Sistema
                        </button>
                    </div>
                </form>

                <hr class="my-4">

                <!-- VERSÃO CORRIGIDA - SEM URLs que não existem -->
                <div class="text-center">
                    <p class="text-muted mb-2">Módulos disponíveis após login:</p>
                    <div class="d-flex flex-wrap justify-content-center gap-2">
                        <span class="badge bg-primary">RH</span>
                        <span class="badge bg-success">Admin</span>
                        <span class="badge bg-info">Equipamentos</span>
                        <span class="badge bg-warning">Combustível</span>
                        <span class="badge bg-secondary">DFEC</span>
                    </div>
                </div>
            </div>
            <div class="card-footer text-center text-muted">
                <small>Sistema de Gestão STAE | Desenvolvimento</small>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
