{% extends 'admin_portal/base.html' %}

{% block content %}
<link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_midnight.min.css" rel="stylesheet">
<script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
/* ========================================= */
/* FUTURISTIC NEON / GLASSMORPHISM EXCEL UX  */
/* ========================================= */
.super-wrapper {
    padding: 20px;
    background: radial-gradient(circle at top left, #0d1117, #000000);
    min-height: 85vh;
    border-radius: 15px;
    box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
    color: #fff;
    font-family: 'Inter', sans-serif;
}

.excel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    border-bottom: 1px solid rgba(0, 255, 255, 0.2);
    padding-bottom: 15px;
}

.excel-header h2 {
    margin: 0;
    font-weight: 800;
    background: -webkit-linear-gradient(#00f2fe, #4facfe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.excel-controls button {
    background: rgba(0, 255, 255, 0.1);
    border: 1px solid #00f2fe;
    color: #00f2fe;
    padding: 8px 20px;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
    margin-left: 10px;
}

.excel-controls button:hover {
    background: #00f2fe;
    color: #000;
    box-shadow: 0 0 15px #00f2fe;
}

/* Tab Navigation (Sheets at Top) */
.sheets-nav {
    display: flex;
    gap: 5px;
    margin-bottom: 15px;
}

.sheet-tab {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-bottom: none;
    padding: 10px 25px;
    border-radius: 8px 8px 0 0;
    color: #aaa;
    cursor: pointer;
    transition: 0.3s;
    font-weight: 600;
}

.sheet-tab.active {
    background: rgba(0, 255, 255, 0.15);
    color: #00f2fe;
    border: 1px solid #00f2fe;
    border-bottom: none;
    box-shadow: 0 -5px 15px rgba(0, 255, 255, 0.1);
}

.sheet-tab:hover:not(.active) {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
}

/* Tabulator Custom Overrides for Glassmorphism */
.tabulator {
    background: rgba(13, 17, 23, 0.7) !important;
    border: 1px solid rgba(0, 255, 255, 0.2) !important;
    border-radius: 0 8px 8px 8px;
    backdrop-filter: blur(10px);
}
.tabulator-header {
    background: rgba(0, 255, 255, 0.05) !important;
    color: #00f2fe !important;
    border-bottom: 1px solid rgba(0, 255, 255, 0.3) !important;
}
.tabulator-row {
    background-color: transparent !important;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
    color: #e6edf3 !important;
}
.tabulator-row:hover {
    background-color: rgba(0, 255, 255, 0.1) !important;
}
.tabulator-cell {
    border-right: 1px solid rgba(255, 255, 255, 0.05) !important;
}
.tabulator-cell input {
    background: transparent !important;
    color: #00f2fe !important;
}

/* Futuristic Modal */
.neon-modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(5px);
    z-index: 9999;
    align-items: center;
    justify-content: center;
}
.neon-modal-content {
    background: #0d1117;
    border: 1px solid #00f2fe;
    box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
    border-radius: 15px;
    padding: 30px;
    width: 400px;
    max-width: 90%;
}
.neon-modal h3 {
    margin-top: 0;
    color: #00f2fe;
}
.neon-modal input, .neon-modal select {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(0,255,255,0.3);
    color: #fff;
    border-radius: 5px;
}
.neon-modal input:focus {
    outline: none;
    border-color: #00f2fe;
    box-shadow: 0 0 10px rgba(0,255,255,0.5);
}
</style>

<div class="super-wrapper">
    <div class="excel-header">
        <h2><i class="bi bi-grid-3x3-gap-fill"></i> PORTAL STAE - NEXUS GRID</h2>
        <div class="excel-controls">
            <button onclick="downloadCSV()"><i class="bi bi-download"></i> EXPORTAR CSV</button>
            <button onclick="openAddModal()"><i class="bi bi-plus-lg"></i> NOVA LINHA</button>
        </div>
    </div>

    <!-- Sheets Tabs -->
    <div class="sheets-nav" id="sheets-nav">
        <button class="sheet-tab active" onclick="loadTab('rh', this)"><i class="bi bi-people"></i> Humanos (RH)</button>
        <button class="sheet-tab" onclick="loadTab('transportes', this)"><i class="bi bi-truck"></i> Frotas (Transportes)</button>
        <button class="sheet-tab" onclick="loadTab('equipamento', this)"><i class="bi bi-pc-display"></i> Material (Equip.)</button>
    </div>

    <!-- The Spreadsheet -->
    <div id="stae-grid"></div>
</div>

<!-- Add Modal -->
<div class="neon-modal" id="addModal">
    <div class="neon-modal-content">
        <h3>ADICIONAR REGISTO</h3>
        <div id="modal-form-fields"></div>
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
            <button class="btn btn-secondary" onclick="closeModal()">CANCELAR</button>
            <button class="btn btn-info" style="background:#00f2fe; color:#000; border:none; font-weight:bold;" onclick="saveNewRow()">GUARDAR</button>
        </div>
    </div>
</div>

<script>
let table;
let currentTab = 'rh';

// As configurações de colunas de acordo com cada Aba
const columnDefs = {
    'rh': [
        {title:"ID", field:"id", width:60, visible:false},
        {title:"Nome Completo", field:"nome_completo", editor:"input", headerFilter:"input"},
        {title:"Nº Identificação", field:"numero_identificacao", editor:"input", headerFilter:"input"},
        {title:"Gênero", field:"genero", editor:"select", editorParams:{values:["M", "F"]}, headerFilter:"input"},
        {title:"Função", field:"funcao", editor:"input", headerFilter:"input"},
        {title:"Telefone", field:"telefone", editor:"input", headerFilter:"input"},
        {formatter:deleteIcon, width:60, hozAlign:"center", cellClick:deleteRow, headerSort:false}
    ],
    'transportes': [
        {title:"ID", field:"id", width:60, visible:false},
        {title:"Matrícula", field:"matricula", editor:"input", headerFilter:"input"},
        {title:"Marca", field:"marca", editor:"input", headerFilter:"input"},
        {title:"Modelo", field:"modelo", editor:"input", headerFilter:"input"},
        {title:"Ano", field:"ano", editor:"number", headerFilter:"input"},
        {title:"Estado", field:"estado", editor:"input", headerFilter:"input"},
        {formatter:deleteIcon, width:60, hozAlign:"center", cellClick:deleteRow, headerSort:false}
    ],
    'equipamento': [
        {title:"ID", field:"id", width:60, visible:false},
        {title:"Nº Série", field:"numero_serie", editor:"input", headerFilter:"input"},
        {title:"Nome", field:"nome", editor:"input", headerFilter:"input"},
        {title:"Marca", field:"marca", editor:"input", headerFilter:"input"},
        {title:"Estado Atual", field:"estado", editor:"input", headerFilter:"input"},
        {formatter:deleteIcon, width:60, hozAlign:"center", cellClick:deleteRow, headerSort:false}
    ]
};

// Icone de apagar
function deleteIcon(cell, formatterParams, onRendered){
    return "<i class='bi bi-trash' style='color:#ff4757; cursor:pointer;'></i>";
}

// Iniciar a grelha Tabulator
function initGrid(tabName) {
    if(table) { table.destroy(); }
    
    table = new Tabulator("#stae-grid", {
        ajaxURL: "/admin_portal/api/super-planilha/?tab=" + tabName,
        layout: "fitColumns",
        columns: columnDefs[tabName],
        pagination: "local",
        paginationSize: 20,
        movableColumns: true,
        resizableRows: true,
        height: "600px",
        placeholder: "Sem Dados",
        cellEdited: function(cell) {
            // Quando edita como excel, manda POST update automatico
            let rowData = cell.getRow().getData();
            sendApiRequest(tabName, 'update', rowData);
        },
    });
}

// Mudar de Aba
function loadTab(tabName, element) {
    currentTab = tabName;
    document.querySelectorAll('.sheet-tab').forEach(el => el.classList.remove('active'));
    if(element) element.classList.add('active');
    initGrid(tabName);
}

// Apagar Linha
function deleteRow(e, cell){
    if(confirm("Tens a certeza que queres eliminar esta linha?")) {
        let row = cell.getRow();
        sendApiRequest(currentTab, 'delete', {id: row.getData().id}).then(() => {
            row.delete();
        });
    }
}

// Modal de Criação Dinâmico
function openAddModal() {
    const fieldsDiv = document.getElementById('modal-form-fields');
    fieldsDiv.innerHTML = '';
    
    columnDefs[currentTab].forEach(col => {
        if(col.field !== 'id' && col.field) {
            let html = `<label style="color:#aaa; font-size:12px;">${col.title}</label>`;
            html += `<input type="text" id="modal_in_${col.field}" placeholder="${col.title}">`;
            fieldsDiv.innerHTML += html;
        }
    });
    
    document.getElementById('addModal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('addModal').style.display = 'none';
}

function saveNewRow() {
    let data = {};
    columnDefs[currentTab].forEach(col => {
        if(col.field !== 'id' && col.field) {
            data[col.field] = document.getElementById(`modal_in_${col.field}`).value;
        }
    });
    
    sendApiRequest(currentTab, 'create', data).then((res) => {
        if(res.sucesso) {
            data.id = res.id;
            table.addRow(data, true);
            closeModal();
        }
    });
}

function downloadCSV() {
    table.download("csv", currentTab + "_dados.csv");
}

// Funcao AJAX fetch genérica
async function sendApiRequest(tab, action, data) {
    const response = await fetch('/admin_portal/api/super-planilha/?tab=' + tab, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({action: action, data: data})
    });
    return response.json();
}

// Iniciar com RH
document.addEventListener("DOMContentLoaded", function() {
    initGrid('rh');
});
</script>

{% endblock %}
