<!-- templates/login_simples.html -->
<!DOCTYPE html>
<html>
<body>
    <h2>TESTE DIRETO</h2>

    <form method="post" action="/accounts/login/">
        {% csrf_token %}
        <p>Usuário: <input type="text" name="username"></p>
        <p>Senha: <input type="password" name="password"></p>
        <button type="submit">Testar Login</button>
    </form>

    <hr>
    <h3>Debug Info:</h3>
    <p>Token: {% csrf_token %}</p>
    <p>Sessão ID: {{ request.session.session_key|default:"Nenhuma" }}</p>
</body>
</html>
