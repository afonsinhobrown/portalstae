<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot STAE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            height: 80vh;
        }
        .chat-messages {
            height: 60vh;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            background-color: #f8f9fa;
        }
        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 80%;
        }
        .user-message {
            background-color: #007bff;
            color: white;
            margin-left: auto;
        }
        .bot-message {
            background-color: #e9ecef;
            color: #333;
        }
        .chat-input {
            border-radius: 25px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand mb-0 h1">
                <i class="fas fa-robot me-2"></i>Assistente Virtual STAE
            </span>
            <a href="/" class="btn btn-outline-light btn-sm">Voltar ao Portal</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="chat-container">
            <!-- Mensagens de Boas-vindas -->
            <div class="chat-messages" id="chatMessages">
                <div class="message bot-message">
                    <strong>Assistente STAE:</strong> Olá! Sou o assistente virtual do STAE.
                    Posso ajudar com informações sobre processos eleitorais, recenseamento, credenciais e mais.
                    Em que posso ajudar?
                </div>
            </div>

            <!-- Input de Mensagem -->
            <div class="input-group mt-3">
                <input type="text" id="mensagemInput" class="form-control chat-input"
                       placeholder="Digite sua mensagem..." autocomplete="off">
                <button class="btn btn-primary" onclick="enviarMensagem()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>

            <!-- Sugestões Rápidas -->
            <div class="mt-3">
                <small class="text-muted">Sugestões rápidas:</small>
                <div class="d-flex flex-wrap gap-2 mt-2">
                    <button class="btn btn-outline-secondary btn-sm" onclick="sugerirPergunta('processos eleitorais')">
                        Processos Eleitorais
                    </button>
                    <button class="btn btn-outline-secondary btn-sm" onclick="sugerirPergunta('recenseamento')">
                        Recenseamento
                    </button>
                    <button class="btn btn-outline-secondary btn-sm" onclick="sugerirPergunta('credenciais')">
                        Credenciais
                    </button>
                    <button class="btn btn-outline-secondary btn-sm" onclick="sugerirPergunta('contacto')">
                        Contactos
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function adicionarMensagem(mensagem, isUser = false) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            messageDiv.innerHTML = `<strong>${isUser ? 'Você' : 'Assistente STAE'}:</strong> ${mensagem}`;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function enviarMensagem() {
            const input = document.getElementById('mensagemInput');
            const mensagem = input.value.trim();

            if (mensagem) {
                adicionarMensagem(mensagem, true);
                input.value = '';

                // Enviar para o backend
                fetch('/chatbot/api/mensagem/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: JSON.stringify({mensagem: mensagem})
                })
                .then(response => response.json())
                .then(data => {
                    adicionarMensagem(data.resposta);
                })
                .catch(error => {
                    adicionarMensagem('Desculpe, ocorreu um erro. Tente novamente.');
                });
            }
        }

        function sugerirPergunta(pergunta) {
            document.getElementById('mensagemInput').value = pergunta;
            enviarMensagem();
        }

        // Enter para enviar
        document.getElementById('mensagemInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                enviarMensagem();
            }
        });
    </script>
</body>
</html>
