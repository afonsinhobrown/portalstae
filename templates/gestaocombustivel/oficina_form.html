{% extends 'gestaocombustivel/base.html' %}

{% block title %}Nova Oficina • Gestão Combustível{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="combustivel-card">
            <div class="card-header bg-transparent border-0 pt-4">
                <h5 class="fw-bold mb-0">Cadastrar Oficina (Prestador)</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nome da Empresa/Oficina *</label>
                        <input type="text" name="nome" class="form-control" required
                            placeholder="Ex: Oficina Central, Lda">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">NUIT *</label>
                            <input type="text" name="nuit" class="form-control" required
                                placeholder="Nº de Identificação Fiscal">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Contacto *</label>
                            <input type="text" name="contacto" class="form-control" required placeholder="+258 ...">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Endereço</label>
                        <input type="text" name="endereco" class="form-control">
                    </div>

                    <div class="d-flex gap-2 justify-content-end mt-4">
                        <a href="{% url 'gestaocombustivel:lista_oficinas' %}"
                            class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-warning px-4">Salvar Oficina</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
