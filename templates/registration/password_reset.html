<!-- templates/registration/password_reset.html -->
{% extends 'base.html' %}

{% block title %}Recuperar Senha • Portal STAE{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="fas fa-key me-2"></i>Recuperar Senha</h4>
                </div>
                <div class="card-body">
                    <p class="text-muted mb-4">
                        Esqueceu sua senha? Digite seu endereço de email abaixo
                        e enviaremos instruções para criar uma nova.
                    </p>

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="id_email" class="form-label">Email:</label>
                            <input type="email" name="email" class="form-control" id="id_email" required>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-paper-plane me-2"></i>Enviar instruções
                            </button>
                            <a href="{% url 'login_publico' %}" class="btn btn-outline-secondary">
                                <i class="fas fa-arrow-left me-2"></i>Voltar ao login
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
