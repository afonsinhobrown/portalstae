<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Portal STAE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Portal STAE - Login</h4>
                    </div>
                    <div class="card-body">
                        {% if form.errors %}
                        <div class="alert alert-danger">
                            Usuário ou senha incorretos.
                        </div>
                        {% endif %}

                        <!-- FORMULÁRIO COM CSRF E FORM DO DJANGO -->
                        <form method="post" action="{% url 'login_publico' %}">
                            {% csrf_token %}  <!-- ← ESTA É A CHAVE! -->

                            <!-- Use o formulário do Django -->
                            <div class="mb-3">
                                <label for="id_username" class="form-label">Usuário:</label>
                                <input type="text"
                                       name="username"
                                       id="id_username"
                                       class="form-control"
                                       required
                                       autofocus>
                            </div>

                            <div class="mb-3">
                                <label for="id_password" class="form-label">Senha:</label>
                                <input type="password"
                                       name="password"
                                       id="id_password"
                                       class="form-control"
                                       required>
                            </div>

                            {% if next %}
                            <input type="hidden" name="next" value="{{ next }}">
                            {% endif %}

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Entrar</button>
                            </div>
                        </form>

                        <hr class="my-4">

                        <div class="text-center">
                            <p class="text-muted">Acesso aos módulos:</p>
                            <div class="d-flex flex-wrap justify-content-center gap-2">
                                <a href="{% url 'login_rh' %}" class="btn btn-sm btn-outline-primary">RH</a>
                                <a href="{% url 'login_admin' %}" class="btn btn-sm btn-outline-success">Admin</a>
                                <a href="{% url 'login_equipamentos' %}" class="btn btn-sm btn-outline-info">Equipamentos</a>
                                <a href="{% url 'login_combustivel' %}" class="btn btn-sm btn-outline-warning">Combustível</a>
                                <a href="{% url 'login_dfec' %}" class="btn btn-sm btn-outline-secondary">DFEC</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
